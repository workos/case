id: no-hardcoded-paths
language: typescript
rule:
  pattern: $STR
  kind: string_fragment
  regex: '/Users/'
message: 'Hardcoded absolute path detected. Use environment variables or computed paths.'
severity: error
note: 'Catches new hardcoded paths in TypeScript. Existing violations in .sh/.md files are outside ast-grep scope — use grep for those.'
