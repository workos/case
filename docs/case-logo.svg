<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">

  <g transform="translate(256, 268)" stroke="#9B93E0" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">

    <!-- === MAIN BODY (base fill) === -->
    <rect x="-120" y="-140" width="240" height="280" rx="10" fill="#9B93E0" fill-opacity="0.06"/>

    <!-- Side panels -->
    <rect x="-145" y="-110" width="22" height="240" rx="5" fill="#9B93E0" fill-opacity="0.1"/>
    <rect x="123" y="-110" width="22" height="240" rx="5" fill="#9B93E0" fill-opacity="0.08"/>

    <!-- === FILLED PANEL SECTIONS (creates depth) === -->
    <!-- Top-left panel -->
    <rect x="-120" y="-140" width="35" height="120" rx="10" fill="#9B93E0" fill-opacity="0.1" stroke="none"/>
    <!-- Top-right panel -->
    <rect x="85" y="-140" width="35" height="120" rx="0" fill="#9B93E0" fill-opacity="0.08" stroke="none"/>
    <!-- Bottom-center panel -->
    <rect x="-40" y="40" width="80" height="100" fill="#9B93E0" fill-opacity="0.04" stroke="none"/>
    <!-- Bottom-left panel -->
    <rect x="-120" y="40" width="80" height="100" fill="#9B93E0" fill-opacity="0.1" stroke="none"/>
    <!-- Bottom-right panel -->
    <rect x="40" y="40" width="80" height="100" fill="#9B93E0" fill-opacity="0.07" stroke="none"/>
    <!-- Mid section -->
    <rect x="-120" y="-20" width="240" height="60" fill="#9B93E0" fill-opacity="0.05" stroke="none"/>

    <!-- === PANEL GRID LINES === -->
    <line x1="-115" y1="-20" x2="115" y2="-20"/>
    <line x1="-115" y1="40" x2="115" y2="40"/>
    <line x1="-40" y1="40" x2="-40" y2="140"/>
    <line x1="40" y1="40" x2="40" y2="140"/>
    <line x1="-85" y1="-140" x2="-85" y2="-130"/>
    <line x1="85" y1="-140" x2="85" y2="-130"/>
    <line x1="-85" y1="-30" x2="-85" y2="-20"/>
    <line x1="85" y1="-30" x2="85" y2="-20"/>

    <!-- === HEAD PANEL (darker inset) === -->
    <rect x="-80" y="-130" width="160" height="100" rx="4" fill="#1a1a2e" fill-opacity="0.8"/>

    <!-- === ANTENNAE === -->
    <line x1="-15" y1="-160" x2="-15" y2="-140" stroke-width="2.5"/>
    <line x1="15" y1="-168" x2="15" y2="-140" stroke-width="2.5"/>
    <circle cx="-15" cy="-163" r="3" fill="#9B93E0"/>
    <circle cx="15" cy="-171" r="3" fill="#9B93E0"/>

    <!-- === EYE === -->
    <circle cx="0" cy="-80" r="28"/>
    <circle cx="0" cy="-80" r="18" stroke-opacity="0.4"/>
    <circle cx="-5" cy="-83" r="7" fill="#B1A9FF" stroke="none"/>

    <!-- === MOUTH / VISOR === -->
    <rect x="-55" y="-5" width="110" height="30" rx="4" fill="#1a1a2e" fill-opacity="0.5"/>

  </g>
</svg>
